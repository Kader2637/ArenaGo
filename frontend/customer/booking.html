<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konfirmasi Pemesanan - ArenaGo</title>
  <!-- CSS Vendors -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <div class="container py-5" style="min-height: 80vh;">
    <!-- Step checkout indicator -->
    <div class="row justify-content-center mb-5">
      <div class="col-md-8 col-lg-6">
        <div class="checkout-steps">
          <div class="step-item active">
            <div class="step-number">1</div>
            <div class="small fw-semibold text-secondary">Isi Detail</div>
          </div>
          <div class="step-item">
            <div class="step-number">2</div>
            <div class="small text-muted">Pembayaran</div>
          </div>
          <div class="step-item">
            <div class="step-number">3</div>
            <div class="small text-muted">Selesai</div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <!-- Checkout Form Panel -->
      <div class="col-lg-7">
        <div class="premium-card p-4 bg-white mb-4">
          <h4 class="fw-bold mb-4">Informasi Kontak Penyewa</h4>
          
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label text-muted small fw-bold">Nama Lengkap</label>
              <input type="text" class="form-control" id="contact-name" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted small fw-bold">Alamat Email</label>
              <input type="email" class="form-control" id="contact-email" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted small fw-bold">Nomor HP / WhatsApp</label>
              <input type="tel" class="form-control" id="contact-phone" readonly>
            </div>
          </div>
        </div>

        <div class="premium-card p-4 bg-white">
          <h4 class="fw-bold mb-4">Catatan Tambahan (Opsional)</h4>
          <textarea class="form-control" id="booking-notes" rows="4" placeholder="Contoh: Butuh pinjam bola futsal, minta lampu dinyalakan tepat waktu..."></textarea>
        </div>
      </div>

      <!-- Booking details summary panel -->
      <div class="col-lg-5">
        <div class="premium-card p-4 bg-white mb-4">
          <h4 class="fw-bold mb-4">Ringkasan Pemesanan</h4>
          
          <div class="d-flex align-items-start gap-3 mb-4">
            <img src="https://images.unsplash.com/photo-1577223625816-7546f13df25d?auto=format&fit=crop&q=80&w=150" class="rounded object-fit-cover" width="80" height="80" id="summary-img">
            <div>
              <h5 class="fw-bold mb-1" id="field-name">-</h5>
              <p class="text-muted small mb-0" id="field-branch">-</p>
              <span class="badge bg-secondary-subtle text-secondary text-capitalize mt-1" id="field-type">-</span>
            </div>
          </div>

          <hr class="my-3">

          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Tanggal</span>
            <strong id="summary-date">-</strong>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Durasi Bermain</span>
            <strong id="summary-duration">-</strong>
          </div>
          <div class="d-flex justify-content-between mb-3">
            <span class="text-muted">Jam Bermain</span>
            <strong id="summary-time">-</strong>
          </div>

          <!-- Promo Voucher input -->
          <div class="mb-4">
            <label class="form-label fw-bold small text-secondary">Punya Kode Voucher?</label>
            <div class="input-group">
              <input type="text" class="form-control text-uppercase" id="voucher-code" placeholder="KODEPROMO">
              <button class="btn btn-outline-primary" type="button" onclick="applyVoucher()">Gunakan</button>
            </div>
            <div id="voucher-message" class="small mt-1 d-none"></div>
          </div>

          <hr class="my-3">

          <!-- Price breaks -->
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Subtotal Sewa</span>
            <span id="price-subtotal">Rp 0</span>
          </div>
          <div class="d-flex justify-content-between mb-2 text-success">
            <span>Potongan Diskon</span>
            <span id="price-discount">-Rp 0</span>
          </div>
          
          <hr class="my-3">

          <div class="d-flex justify-content-between mb-4">
            <strong class="fs-5">Total Pembayaran</strong>
            <strong class="fs-4 text-primary" id="price-total">Rp 0</strong>
          </div>

          <button class="btn btn-primary w-100 gradient-btn fw-bold py-3 rounded" onclick="submitBooking()">
            Konfirmasi & Pesan Lapangan <i class="bi bi-check-lg ms-1"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <!-- Vendors JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- App JS -->
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/app.js"></script>

  <script>
    Auth.guard(['customer']);

    const fieldId = App.getQueryParam('id');
    const dateStr = App.getQueryParam('date');
    const startStr = App.getQueryParam('start');
    const endStr = App.getQueryParam('end');

    let subtotalPrice = 0;
    let appliedDiscount = 0;
    let selectedVoucherId = null;

    document.addEventListener('DOMContentLoaded', () => {
      if (!fieldId || !dateStr || !startStr || !endStr) {
        window.location.href = '/customer/lapangan.html';
        return;
      }

      loadContactDetails();
      loadBookingSummary();
    });

    function loadContactDetails() {
      const user = Auth.getUser();
      document.getElementById('contact-name').value = user.nama;
      document.getElementById('contact-email').value = user.email;
      document.getElementById('contact-phone').value = user.no_hp || '';
    }

    async function loadBookingSummary() {
      App.showLoader();
      try {
        const response = await fetch(`${BASE_URL}/api/v1/lapangan/${fieldId}`);
        if (response.ok) {
          const res = await response.json();
          const { field } = res.data;
          
          document.getElementById('field-name').textContent = field.nama;
          document.getElementById('field-branch').innerHTML = `<i class="bi bi-geo-alt-fill text-danger me-1"></i>${field.nama_cabang} - ${field.kota}`;
          document.getElementById('field-type').textContent = field.tipe;
          
          if (field.foto) {
            document.getElementById('summary-img').src = `${BASE_URL}/uploads/lapangan/${field.foto}`;
          }

          document.getElementById('summary-date').textContent = App.formatDate(dateStr);
          document.getElementById('summary-time').textContent = `${startStr} - ${endStr}`;
          
          // Calculate price details from backend api to be secure
          const priceRes = await fetch(`${BASE_URL}/api/v1/lapangan/${fieldId}/calculate?tanggal=${dateStr}&jam_mulai=${startStr}&jam_selesai=${endStr}`);
          App.hideLoader();
          
          if (priceRes.ok) {
            const priceData = await priceRes.json();
            subtotalPrice = parseFloat(priceData.data.subtotal);
            document.getElementById('summary-duration').textContent = `${priceData.data.durasi} Jam`;
            updatePriceBreakdown();
          }
        }
      } catch (err) {
        App.hideLoader();
        console.error(err);
      }
    }

    function updatePriceBreakdown() {
      const total = subtotalPrice - appliedDiscount;
      
      document.getElementById('price-subtotal').textContent = App.formatRupiah(subtotalPrice);
      document.getElementById('price-discount').textContent = `- ${App.formatRupiah(appliedDiscount)}`;
      document.getElementById('price-total').textContent = App.formatRupiah(total);
    }

    async function applyVoucher() {
      const code = document.getElementById('voucher-code').value.trim().toUpperCase();
      const msgBox = document.getElementById('voucher-message');
      
      if (!code) {
        App.showAlert('Error', 'Silakan isi kode voucher terlebih dahulu.', 'warning');
        return;
      }

      msgBox.className = 'small mt-1 text-muted';
      msgBox.textContent = 'Memverifikasi voucher...';
      msgBox.classList.remove('d-none');

      try {
        const response = await Auth.fetchWithAuth(`${BASE_URL}/api/v1/voucher/check?kode=${code}&subtotal=${subtotalPrice}`);
        if (response.ok) {
          const res = await response.json();
          const v = res.data;
          
          if (v.tipe_diskon === 'persen') {
            appliedDiscount = (parseFloat(v.diskon) / 100) * subtotalPrice;
          } else {
            appliedDiscount = parseFloat(v.diskon);
          }

          if (appliedDiscount > subtotalPrice) appliedDiscount = subtotalPrice;

          msgBox.className = 'small mt-1 text-success fw-semibold';
          msgBox.innerHTML = `<i class="bi bi-patch-check-fill"></i> Voucher berhasil digunakan! Diskon: ${App.formatRupiah(appliedDiscount)}`;
          updatePriceBreakdown();
        } else {
          const res = await response.json();
          appliedDiscount = 0;
          msgBox.className = 'small mt-1 text-danger';
          msgBox.innerHTML = `<i class="bi bi-exclamation-circle-fill"></i> ${res.message || 'Voucher tidak valid'}`;
          updatePriceBreakdown();
        }
      } catch (err) {
        console.error(err);
        msgBox.className = 'small mt-1 text-danger';
        msgBox.textContent = 'Gagal memproses voucher.';
      }
    }

    async function submitBooking() {
      const catatan = document.getElementById('booking-notes').value.trim();
      const voucherKode = document.getElementById('voucher-code').value.trim();

      App.showConfirm('Buat Booking', 'Apakah Anda yakin ingin membooking lapangan olahraga ini?').then(async (res) => {
        if (res.isConfirmed) {
          App.showLoader();
          try {
            const response = await Auth.fetchWithAuth(`${BASE_URL}/api/v1/booking`, {
              method: 'POST',
              body: JSON.stringify({
                lapangan_id: fieldId,
                tanggal: dateStr,
                jam_mulai: startStr,
                jam_selesai: endStr,
                catatan,
                kode_voucher: voucherKode
              })
            });
            App.hideLoader();
            
            if (response.ok) {
              const resData = await response.json();
              App.showAlert('Booking Berhasil!', 'Booking Anda berhasil dibuat. Silakan lakukan pembayaran.', 'success').then(() => {
                window.location.href = `/customer/pembayaran.html?booking_id=${resData.data.id}`;
              });
            } else {
              const resData = await response.json();
              App.showAlert('Pemesanan Gagal', resData.message || 'Gagal menyimpan booking.', 'error');
            }
          } catch (err) {
            App.hideLoader();
            App.showAlert('Error', 'Gagal memproses permintaan booking.', 'error');
          }
        }
      });
    }
  </script>
</body>
</html>
