<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Saya - ArenaGo</title>
  <!-- CSS Vendors -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <div class="container py-5" style="min-height: 80vh;">
    <h2 class="fw-bold mb-4"><i class="bi bi-person-gear text-primary me-2"></i>Pengaturan Profil</h2>

    <div class="row g-4">
      <!-- Left side: profile photo widget card -->
      <div class="col-lg-4">
        <div class="premium-card p-4 bg-white text-center shadow-sm">
          <div class="position-relative d-inline-block mb-3">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=200" id="profile-avatar" class="rounded-circle border border-4 border-primary img-thumbnail" style="width: 150px; height: 150px; object-fit: cover;" alt="Avatar">
          </div>
          <h4 class="fw-bold text-dark mb-1" id="profile-name">Nama Pengguna</h4>
          <span class="badge bg-primary text-uppercase px-3 py-2" id="profile-role">Customer</span>
          
          <hr class="my-4">
          
          <div class="text-start">
            <h6 class="fw-bold text-secondary mb-2">Keamanan Akun</h6>
            <p class="text-muted small">Perbarui sandi secara berkala guna melindungi akun dari akses ilegal.</p>
            <button class="btn btn-outline-primary btn-sm w-100 rounded fw-bold" data-bs-toggle="collapse" data-bs-target="#password-collapse">Ganti Password</button>
          </div>
        </div>
      </div>

      <!-- Right side: forms fields card -->
      <div class="col-lg-8">
        <!-- Edit Profile Form -->
        <div class="premium-card p-4 p-md-5 bg-white mb-4 shadow-sm">
          <h4 class="fw-bold mb-4">Ubah Data Diri</h4>
          
          <form id="profile-form">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="nama" class="form-label fw-semibold text-secondary">Nama Lengkap</label>
                <input type="text" class="form-control" id="nama" required>
              </div>
              <div class="col-md-6">
                <label for="email" class="form-label fw-semibold text-secondary">Email (ID Login)</label>
                <input type="email" class="form-control" id="email" readonly disabled>
              </div>
              <div class="col-md-6">
                <label for="no_hp" class="form-label fw-semibold text-secondary">Nomor HP / WhatsApp</label>
                <input type="tel" class="form-control" id="no_hp">
              </div>
              <div class="col-md-6">
                <label for="foto_user" class="form-label fw-semibold text-secondary">Foto Avatar Baru</label>
                <input type="file" class="form-control" id="foto_user" accept="image/*">
              </div>
            </div>

            <!-- Ganti Password collapse -->
            <div class="collapse mt-4" id="password-collapse">
              <div class="border-top pt-4">
                <h5 class="fw-bold text-danger mb-3">Ubah Password Akun</h5>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="new-password" class="form-label fw-semibold text-secondary">Password Baru</label>
                    <input type="password" class="form-control" id="new-password" placeholder="Minimal 6 karakter">
                  </div>
                  <div class="col-md-6">
                    <label for="confirm-new-password" class="form-label fw-semibold text-secondary">Konfirmasi Password Baru</label>
                    <input type="password" class="form-control" id="confirm-new-password" placeholder="Ulangi password baru">
                  </div>
                </div>
              </div>
            </div>

            <!-- Mitra settings segment -->
            <div class="d-none mt-4 border-top pt-4" id="mitra-profile-section">
              <h5 class="fw-bold text-primary mb-3">Informasi Bisnis Mitra</h5>
              <div class="row g-3">
                <div class="col-12">
                  <label for="nama_perusahaan" class="form-label fw-semibold text-secondary">Nama Perusahaan / Sports Center</label>
                  <input type="text" class="form-control" id="nama_perusahaan">
                </div>
                <div class="col-12">
                  <label for="deskripsi" class="form-label fw-semibold text-secondary">Deskripsi Bisnis</label>
                  <textarea class="form-control" id="deskripsi" rows="3"></textarea>
                </div>
                <div class="col-md-6">
                  <label for="telepon" class="form-label fw-semibold text-secondary">Telepon Kantor</label>
                  <input type="text" class="form-control" id="telepon">
                </div>
                <div class="col-md-6">
                  <label for="whatsapp" class="form-label fw-semibold text-secondary">WhatsApp Bisnis</label>
                  <input type="text" class="form-control" id="whatsapp">
                </div>
                <div class="col-md-6">
                  <label for="instagram" class="form-label fw-semibold text-secondary">Instagram Username</label>
                  <input type="text" class="form-control" id="instagram" placeholder="Contoh: budisports">
                </div>
                <div class="col-md-6">
                  <label for="website" class="form-label fw-semibold text-secondary">Website URL</label>
                  <input type="url" class="form-control" id="website" placeholder="Contoh: https://budisports.com">
                </div>
                <div class="col-12">
                  <label for="alamat" class="form-label fw-semibold text-secondary">Alamat Bisnis Lengkap</label>
                  <textarea class="form-control" id="alamat" rows="2"></textarea>
                </div>
                <div class="col-md-6">
                  <label for="logo_mitra" class="form-label fw-semibold text-secondary">Logo Perusahaan</label>
                  <input type="file" class="form-control" id="logo_mitra" accept="image/*">
                </div>
                <div class="col-md-6">
                  <label for="banner_mitra" class="form-label fw-semibold text-secondary">Banner Sports Center</label>
                  <input type="file" class="form-control" id="banner_mitra" accept="image/*">
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-primary gradient-btn fw-bold px-4 py-3 rounded mt-4">
              Simpan Perubahan <i class="bi bi-check-lg ms-1"></i>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <!-- Vendors JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- App JS -->
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/app.js"></script>

  <script>
    Auth.guard();

    document.addEventListener('DOMContentLoaded', () => {
      loadProfileData();

      document.getElementById('profile-form').addEventListener('submit', handleProfileUpdate);
    });

    async function loadProfileData() {
      App.showLoader();
      try {
        const response = await Auth.fetchWithAuth(`${BASE_URL}/api/v1/auth/profile`);
        App.hideLoader();
        if (response.ok) {
          const res = await response.json();
          renderProfile(res.data);
        }
      } catch (err) {
        App.hideLoader();
        console.error(err);
      }
    }

    function renderProfile(user) {
      document.getElementById('profile-name').textContent = user.nama;
      document.getElementById('profile-role').textContent = user.role.replace('_', ' ');

      if (user.foto) {
        document.getElementById('profile-avatar').src = `${BASE_URL}/uploads/users/${user.foto}`;
      }

      document.getElementById('nama').value = user.nama;
      document.getElementById('email').value = user.email;
      document.getElementById('no_hp').value = user.no_hp || '';

      if (user.role === 'mitra' && user.mitraProfile) {
        document.getElementById('mitra-profile-section').classList.remove('d-none');
        
        const mp = user.mitraProfile;
        document.getElementById('nama_perusahaan').value = mp.nama_perusahaan || '';
        document.getElementById('deskripsi').value = mp.deskripsi || '';
        document.getElementById('telepon').value = mp.telepon || '';
        document.getElementById('whatsapp').value = mp.whatsapp || '';
        document.getElementById('instagram').value = mp.instagram || '';
        document.getElementById('website').value = mp.website || '';
        document.getElementById('alamat').value = mp.alamat || '';
      }
    }

    async function handleProfileUpdate(e) {
      e.preventDefault();

      const newPass = document.getElementById('new-password').value;
      const confPass = document.getElementById('confirm-new-password').value;

      if (newPass && newPass !== confPass) {
        App.showAlert('Error', 'Password baru dan konfirmasi password tidak cocok.', 'warning');
        return;
      }

      const formData = new FormData();
      formData.append('nama', document.getElementById('nama').value.trim());
      formData.append('no_hp', document.getElementById('no_hp').value.trim());
      
      if (newPass) {
        formData.append('password', newPass);
      }

      const avatarInput = document.getElementById('foto_user');
      if (avatarInput.files[0]) {
        formData.append('foto_user', avatarInput.files[0]);
      }

      const user = Auth.getUser();
      if (user.role === 'mitra') {
        formData.append('nama_perusahaan', document.getElementById('nama_perusahaan').value.trim());
        formData.append('deskripsi', document.getElementById('deskripsi').value.trim());
        formData.append('telepon', document.getElementById('telepon').value.trim());
        formData.append('whatsapp', document.getElementById('whatsapp').value.trim());
        formData.append('instagram', document.getElementById('instagram').value.trim());
        formData.append('website', document.getElementById('website').value.trim());
        formData.append('alamat', document.getElementById('alamat').value.trim());

        const logoInput = document.getElementById('logo_mitra');
        if (logoInput.files[0]) formData.append('logo_mitra', logoInput.files[0]);

        const bannerInput = document.getElementById('banner_mitra');
        if (bannerInput.files[0]) formData.append('banner_mitra', bannerInput.files[0]);
      }

      App.showConfirm('Simpan Profil', 'Apakah Anda yakin ingin menyimpan perubahan profil ini?').then(async (res) => {
        if (res.isConfirmed) {
          App.showLoader();
          try {
            const response = await Auth.fetchWithAuth(`${BASE_URL}/api/v1/auth/profile`, {
              method: 'PUT',
              body: formData // Form data submission
            });
            App.hideLoader();

            if (response.ok) {
              const resData = await response.json();
              // Update local storage user profile name & photo
              const storedUser = Auth.getUser();
              storedUser.nama = resData.data.nama;
              storedUser.foto = resData.data.foto;
              storedUser.no_hp = resData.data.no_hp;
              Auth.setSession({ user: storedUser });

              App.showAlert('Profil Diperbarui!', 'Informasi profil Anda berhasil disimpan.', 'success').then(() => {
                location.reload();
              });
            } else {
              const resData = await response.json();
              App.showAlert('Gagal Menyimpan', resData.message || 'Gagal merubah data profil.', 'error');
            }
          } catch (err) {
            App.hideLoader();
            console.error(err);
          }
        }
      });
    }
  </script>
</body>
</html>
