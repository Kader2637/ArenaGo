<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun ArenaGo - Sports Field Booking Marketplace</title>
  <!-- CSS Vendors -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100 py-5">

  <div class="container my-4">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6 col-xl-5">
        <div class="text-center mb-4">
          <a href="/" class="d-inline-flex align-items-center text-primary fw-bold fs-2 text-decoration-none">
            <i class="bi bi-lightning-fill me-2"></i>Arena<span class="text-dark">Go</span>
          </a>
          <p class="text-muted mt-2">Daftar sekarang untuk mulai memesan lapangan olahraga online</p>
        </div>

        <div class="premium-card p-4 p-md-5">
          <h3 class="fw-bold mb-4 text-center">Registrasi Akun</h3>
          
          <form id="register-form">
            <div class="mb-3">
              <label for="nama" class="form-label fw-semibold">Nama Lengkap</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
                <input type="text" class="form-control border-start-0" id="nama" placeholder="Budi Santoso" required>
              </div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">Alamat Email</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" class="form-control border-start-0" id="email" placeholder="budi@email.com" required>
              </div>
            </div>

            <div class="mb-3">
              <label for="no_hp" class="form-label fw-semibold">Nomor Handphone (WhatsApp)</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-telephone text-muted"></i></span>
                <input type="tel" class="form-control border-start-0" id="no_hp" placeholder="0812XXXXXXXX" required>
              </div>
            </div>

            <div class="mb-3">
              <label for="role" class="form-label fw-semibold">Daftar Sebagai</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-shield-lock text-muted"></i></span>
                <select class="form-select border-start-0" id="role" required>
                  <option value="customer" selected>Customer (Penyewa Lapangan)</option>
                  <option value="mitra">Mitra (Pemilik Lapangan / Sports Center)</option>
                  <option value="staff_cabang">Staff Cabang (Operator Lokasi Lapangan)</option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" class="form-control border-start-0" id="password" placeholder="Minimal 6 karakter" required>
              </div>
            </div>

            <div class="mb-4">
              <label for="confirm_password" class="form-label fw-semibold">Konfirmasi Password</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" class="form-control border-start-0" id="confirm_password" placeholder="Ulangi password" required>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 gradient-btn py-3 fw-bold rounded mb-3">
              Daftar Sekarang <i class="bi bi-person-plus ms-1"></i>
            </button>
            
            <p class="text-center text-muted small mb-0">Sudah memiliki akun? <a href="/login.html" class="text-primary fw-semibold text-decoration-none">Masuk disini</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Vendors JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- App JS -->
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/app.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // If already logged in, redirect to home
      if (Auth.isAuthenticated()) {
        window.location.href = '/';
      }

      const form = document.getElementById('register-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const nama = document.getElementById('nama').value.trim();
        const email = document.getElementById('email').value.trim();
        const no_hp = document.getElementById('no_hp').value.trim();
        const role = document.getElementById('role').value;
        const password = document.getElementById('password').value.trim();
        const confirm_password = document.getElementById('confirm_password').value.trim();

        if (password !== confirm_password) {
          return App.showAlert('Registrasi Gagal', 'Password dan Konfirmasi Password tidak cocok.', 'error');
        }

        if (password.length < 6) {
          return App.showAlert('Registrasi Gagal', 'Password minimal harus terdiri dari 6 karakter.', 'error');
        }

        App.showLoader();
        try {
          await Auth.register(nama, email, password, confirm_password, no_hp, role);
          App.hideLoader();
          
          App.showAlert('Daftar Berhasil!', 'Akun Anda berhasil didaftarkan. Silakan login.', 'success').then(() => {
            window.location.href = '/login.html';
          });
        } catch (error) {
          App.hideLoader();
          App.showAlert('Gagal Mendaftar', error.message, 'error');
        }
      });
    });
  </script>
</body>
</html>
